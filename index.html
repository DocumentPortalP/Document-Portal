<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panelto Portal</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#e9eef5,#dbe6f3);
  font-family:Inter,Segoe UI,Arial,sans-serif;
}

.container{
  width:min(1100px,92vw);
}

h1{
  text-align:center;
  margin-bottom:40px;
  color:#1f2937;
  font-size:42px;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:32px;
}

.card{
  background:white;
  border-radius:28px;
  padding:48px 36px;
  min-height:280px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  text-decoration:none;
  color:#1f2937;
  border:1px solid #dbe2ea;
  box-shadow:0 18px 40px rgba(15,23,42,.10);
  transition:.25s ease;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 24px 50px rgba(15,23,42,.16);
}

.icon{
  font-size:64px;
  margin-bottom:20px;
}

.title{
  font-size:30px;
  font-weight:800;
  margin-bottom:12px;
}

.desc{
  font-size:16px;
  color:#64748b;
  max-width:320px;
  line-height:1.5;
}

@media (max-width:800px){
  .cards{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
  <div class="container">
    <h1>Engineering Portal</h1>

    <div class="cards">
      <a class="card" href="shift_cover_schedule.html">
        <div class="icon">📅</div>
        <div class="title">Shift Schedule</div>
        <div class="desc">
          
        </div>
      </a>

      <a class="card" href="documentation_portal.html">
        <div class="icon">📁</div>
        <div class="title">Documentation Portal</div>
        <div class="desc">
        
        </div>
      </a>
    </div>
  </div>
</body>
</html>
